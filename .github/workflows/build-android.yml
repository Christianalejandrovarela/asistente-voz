name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Build Android APK (local — no EAS quota)
        working-directory: artifacts/mobile
        run: eas build --platform android --profile preview --local --output ../../app-preview.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Find APK if --output flag not supported
        if: always()
        run: |
          echo "=== Looking for APK ==="
          find . -name "*.apk" -not -path "*/node_modules/*" 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-preview-apk
          path: app-preview.apk
          retention-days: 14
          if-no-files-found: warn
